<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:         #0f0f13;
    --surface:    #17171e;
    --surface2:   #1f1f2a;
    --surface3:   #262634;
    --border:     #2e2e3e;
    --border2:    #3a3a50;
    --accent:     #8b7cf8;
    --accent2:    #a99fff;
    --accent-glow:#8b7cf840;
    --user-bg:    #1a1435;
    --user-border:#3d2d80;
    --user-txt:   #e2d9ff;
    --ai-txt:     #dcdce8;
    --muted:      #5a5a75;
    --muted2:     #7a7a95;
    --green:      #4ade80;
    --red:        #f87171;
    --radius:     16px;
    --radius-sm:  10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ai-txt);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    flex: 1;
    min-width: 0;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #8b7cf8, #c084fc);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 12px #8b7cf830;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .logo-title {
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 0.2px;
    line-height: 1.2;
  }

  .header-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .icon-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
  }
  .icon-btn:hover {
    color: var(--ai-txt);
    background: var(--surface2);
    border-color: var(--border);
  }

  /* ── PAGE PILL ── */
  #page-pill {
    padding: 6px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    box-shadow: 0 0 8px #4ade8077;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── SETTINGS PANEL ── */
  #settings {
    display: none;
    padding: 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
    flex-direction: column;
  }
  #settings.open { display: flex; }

  .settings-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 2px;
  }

  .setting-row { display: flex; flex-direction: column; gap: 5px; }
  .setting-row label {
    font-size: 11px;
    color: var(--muted2);
    font-weight: 500;
  }
  .setting-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--ai-txt);
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    font-size: 11.5px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .setting-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .settings-footer { display: flex; justify-content: flex-end; }
  #saveSettings {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  #saveSettings:hover { background: var(--accent2); }
  #saveSettings:active { transform: scale(0.97); }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── MESSAGE ROW ── */
  .msg-row {
    display: flex;
    gap: 9px;
    align-items: flex-start;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px; height: 26px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin-top: 1px;
  }
  .avatar.user-av {
    background: linear-gradient(135deg, #4f3fa8, #7c5fc4);
    color: #e2d9ff;
    font-size: 11px;
  }
  .avatar.ai-av {
    background: linear-gradient(135deg, #1f1a3d, #2d2460);
    border: 1px solid var(--border2);
  }

  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: calc(100% - 38px);
    min-width: 0;
  }
  .msg-row.user .msg-body { align-items: flex-end; }

  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    padding: 0 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bubble {
    padding: 10px 13px;
    border-radius: var(--radius);
    line-height: 1.65;
    word-break: break-word;
    position: relative;
  }

  .user .bubble {
    background: var(--user-bg);
    color: var(--user-txt);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
  }

  .assistant .bubble {
    background: var(--surface);
    color: var(--ai-txt);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* code in bubbles */
  .bubble code {
    background: var(--surface3);
    border: 1px solid var(--border2);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11.5px;
    color: #c4b5fd;
  }
  .bubble pre {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    overflow-x: auto;
    margin-top: 8px;
    position: relative;
  }
  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    color: #c4b5fd;
    font-size: 11.5px;
  }

  /* copy button on messages */
  .copy-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    transition: color 0.15s;
    font-family: inherit;
    line-height: 1;
  }
  .copy-btn:hover { color: var(--ai-txt); }

  /* thinking animation */
  .thinking-dots {
    display: flex; gap: 5px; align-items: center; padding: 5px 2px;
  }
  .thinking-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0) scale(0.8); opacity: 0.3; }
    40%           { transform: translateY(-6px) scale(1); opacity: 1; }
  }

  /* empty state */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 24px 20px;
  }

  .empty-logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #8b7cf820, #c084fc20);
    border: 1px solid var(--border2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }

  #empty h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted2);
  }
  #empty p {
    font-size: 11.5px;
    line-height: 1.6;
    max-width: 200px;
    color: var(--muted);
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    max-width: 240px;
    margin-top: 4px;
  }
  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 11.5px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: inherit;
    line-height: 1.4;
  }
  .suggestion:hover {
    border-color: var(--accent);
    color: var(--ai-txt);
    background: var(--surface3);
  }

  /* ── INPUT AREA ── */
  #input-area {
    padding: 10px 12px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #input-box {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 12px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--ai-txt);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    resize: none;
    outline: none;
    line-height: 1.55;
    max-height: 120px;
    min-height: 20px;
  }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    background: var(--accent);
    border: none;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    align-self: flex-end;
  }
  #sendBtn:hover:not(:disabled) { background: var(--accent2); }
  #sendBtn:active:not(:disabled) { transform: scale(0.9); }
  #sendBtn:disabled { background: var(--surface3); cursor: not-allowed; opacity: 0.5; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2px;
  }
  .hint { font-size: 10px; color: var(--muted); }
  .model-badge {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface3);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 72px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface3);
    border: 1px solid var(--border2);
    color: var(--ai-txt);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 11.5px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    white-space: nowrap;
    z-index: 99;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: #f87171; color: #fca5a5; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 3C7 3 3 7 3 12s4 9 9 9 9-4 9-9-4-9-9-9zm0 4l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4l2-4z" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <div class="logo-text">
      <div class="logo-title">Claude AI</div>
      <div class="logo-sub">Powered by AWS Bedrock</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="settingsBtn" title="Settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
    <button class="icon-btn" id="clearBtn" title="New chat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </div>
</div>

<!-- PAGE PILL -->
<div id="page-pill">
  <span class="status-dot"></span>
  <span id="page-title">Loading page...</span>
</div>

<!-- SETTINGS PANEL -->
<div id="settings">
  <div class="settings-title">Configuration</div>
  <div class="setting-row">
    <label>Backend URL</label>
    <input type="text" id="cfg-url" value="https://chrome-ai-sidebar-beta.vercel.app" placeholder="https://chrome-ai-sidebar-beta.vercel.app"/>
  </div>
  <div class="setting-row">
    <label>Model ID</label>
    <input type="text" id="cfg-model" value="us.anthropic.claude-opus-4-6-v1"/>
  </div>
  <div class="settings-footer">
    <button id="saveSettings">Save Settings</button>
  </div>
</div>

<!-- MESSAGES -->
<div id="messages">
  <div id="empty">
    <div class="empty-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 3C7 3 3 7 3 12s4 9 9 9 9-4 9-9-4-9-9-9zm0 4l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4l2-4z" fill="#8b7cf8" opacity="0.7"/>
      </svg>
    </div>
    <h3>Ask Claude</h3>
    <p>Chat about the page you're reading or ask anything</p>
    <div class="suggestions">
      <button class="suggestion">Summarize this page</button>
      <button class="suggestion">What are the key points?</button>
      <button class="suggestion">Explain this in simple terms</button>
    </div>
  </div>
</div>

<!-- INPUT -->
<div id="input-area">
  <div id="input-box">
    <textarea id="userInput" placeholder="Ask about this page…" rows="1"></textarea>
    <button id="sendBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="input-footer">
    <span class="hint">Enter to send · Shift+Enter for newline</span>
    <span class="model-badge" id="model-badge">Opus 4.6</span>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="sidebar.js"></script>

</body>
</html>
