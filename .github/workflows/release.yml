name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-extension:
    name: Package Chrome Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Bump version in manifest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('extension/manifest.json', 'utf8'));
            m.version = '${VERSION}';
            fs.writeFileSync('extension/manifest.json', JSON.stringify(m, null, 2));
            console.log('Updated manifest version to', m.version);
          "

      - name: Build extension zip
        run: |
          cd extension
          zip -r ../claude-ai-sidebar-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.DS_Store"
          echo "✅ Extension packaged"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude AI Sidebar ${{ steps.version.outputs.VERSION }}
          body: |
            ## Claude AI Sidebar ${{ steps.version.outputs.VERSION }}

            ### Install Extension
            1. Download `claude-ai-sidebar-${{ steps.version.outputs.VERSION }}.zip`
            2. Unzip it
            3. Open `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ### Run Backend
            ```bash
            cd backend
            npm install
            node server.js
            ```
          files: claude-ai-sidebar-${{ steps.version.outputs.VERSION }}.zip

  deploy-vercel:
    name: Deploy Backend to Vercel
    runs-on: ubuntu-latest
    needs: package-extension

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel env add AWS_ACCESS_KEY_ID production <<< "${{ secrets.AWS_ACCESS_KEY_ID }}" || true
          vercel env add AWS_SECRET_ACCESS_KEY production <<< "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || true
          vercel env add AWS_REGION production <<< "us-east-1" || true
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
