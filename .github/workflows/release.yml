name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package-extension:
    name: Package Chrome Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Bump version in manifest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('extension/manifest.json', 'utf8'));
            m.version = '${VERSION}';
            fs.writeFileSync('extension/manifest.json', JSON.stringify(m, null, 2));
            console.log('Updated manifest version to', m.version);
          "

      - name: Build extension zip
        run: |
          cd extension
          zip -r ../claude-ai-sidebar-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          echo "✅ Extension packaged"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude AI Sidebar ${{ steps.version.outputs.VERSION }}
          body: |
            ## Claude AI Sidebar ${{ steps.version.outputs.VERSION }}

            ### Install
            1. Download `claude-ai-sidebar-${{ steps.version.outputs.VERSION }}.zip`
            2. Unzip it
            3. Open `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ### Backend
            ```bash
            cd backend
            npm install
            node server.js
            ```
          files: claude-ai-sidebar-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

  deploy-backend:
    name: Deploy Backend (optional)
    runs-on: ubuntu-latest
    needs: package-extension
    if: vars.DEPLOY_BACKEND == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/chrome-ai-sidebar/backend
            git pull origin main
            npm ci --omit=dev
            pm2 restart claude-sidebar || pm2 start server.js --name claude-sidebar
