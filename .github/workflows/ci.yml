name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend – Install & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Check server starts (smoke test)
        working-directory: backend
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_REGION: us-east-1
          PORT: 3456
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3456/)
          kill $SERVER_PID
          if [ "$STATUS" != "200" ]; then
            echo "❌ Server health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Server started and responded with HTTP $STATUS"

  extension:
    name: Extension – Validate Manifest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./extension/manifest.json');
            if (!m.manifest_version) throw new Error('missing manifest_version');
            if (!m.name) throw new Error('missing name');
            if (!m.version) throw new Error('missing version');
            console.log('✅ manifest.json is valid:', m.name, 'v' + m.version);
          "

      - name: Check required extension files
        run: |
          for f in extension/manifest.json extension/sidebar.html extension/sidebar.js extension/bg.js; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
            echo "✅ Found: $f"
          done
